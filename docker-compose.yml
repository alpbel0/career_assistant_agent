version: '3.8'

services:
  bot:
    build: .
    container_name: agent
    restart: unless-stopped
    command: python -m bot.telegram_bot
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; print('OK')"]
      interval: 30s
      timeout: 10s
      retries: 3

  api:
    build: .
    container_name: career_api
    restart: unless-stopped
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
